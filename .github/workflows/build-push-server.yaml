name: Build Push Server GHCR
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./PlanetHunter
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/planet-hunter-server:latest
            ghcr.io/${{ github.repository }}/planet-hunter-server:${{ github.sha }}

